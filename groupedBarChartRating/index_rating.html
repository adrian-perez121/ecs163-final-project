<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Average IMDb Rating by Budget &amp; Era - Action Genre</title>
  <style>
    /* ── Reset & Base Styles ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f7fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 16px;
    }

    /* ── Card Wrapper ── */
    .card {
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 28px 28px 24px 28px;
      width: 820px;
      max-width: 100%;
    }

    /* ── DOM Titles ── */
    .chart-title {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
    }

    .chart-subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 24px;
    }

    /* ── SVG Container ── */
    #chart {
      width: 100%;
    }

    #chart svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }

    /* ── Axes & Gridlines ── */
    .axis path,
    .axis line {
      stroke: #d0d8e4;
      stroke-width: 1;
      shape-rendering: crispEdges;
    }

    .axis text {
      fill: #6b7280;
      font-size: 11px;
    }

    .grid line {
      stroke: #e8eef5;
      shape-rendering: crispEdges;
    }

    .grid .domain { 
      display: none !important; 
    }

    .axis-label {
      fill: #4b5563;
      font-size: 13px;
      font-weight: 500;
    }

    /* ── Chart Bars ── */
    .bar {
      rx: 2;
      ry: 2;
      cursor: pointer;
      transition: filter 0.15s ease;
    }

    .bar:hover {
      filter: brightness(1.12);
    }

    .bar--cat0 { fill: #10ff00; }
    .bar--cat1 { fill: #00cf00; }
    .bar--cat2 { fill: #009f00; }
    .bar--cat3 { fill: #006000; }

    /* ── Dynamic Tooltip ── */
    .tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(30, 30, 30, 0.9);
      color: #fff;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 0.1s ease;
      z-index: 10;
    }

    .tooltip.visible {
      opacity: 1;
    }

    .tooltip strong {
      display: block;
      color: #10ff00;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="card" id="chart-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js" defer></script>
  <script src="./chart_rating.js" defer></script>
</body>
</html>
